<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font: 12px/1.4 system-ui, sans-serif;
        width: 420px;
        margin: 0;
        padding: 10px;
        color: #eee;
        background: #1b1d22;
      }
      h1 {
        font-size: 13px;
        margin: 0 0 8px;
      }
      .row {
        display: flex;
        gap: 6px;
        align-items: center;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }
      button {
        background: #2d323b;
        color: #eee;
        border: 1px solid #444;
        border-radius: 5px;
        padding: 5px 9px;
        cursor: pointer;
        font-size: 12px;
      }
      button:hover {
        background: #3a4048;
      }
      button.on {
        background: #a33;
        border-color: #c55;
      }
      .cap {
        border: 1px solid #333;
        border-radius: 5px;
        margin-bottom: 6px;
        padding: 6px;
        background: #22252b;
      }
      .cap .meta {
        color: #8bd;
        margin-bottom: 4px;
        word-break: break-all;
      }
      .cap .blk {
        color: #e77;
      }
      textarea {
        width: 100%;
        height: 46px;
        box-sizing: border-box;
        background: #14161a;
        color: #9c9;
        border: 1px solid #333;
        border-radius: 4px;
        font: 10px/1.3 monospace;
        resize: vertical;
      }
      .small {
        color: #888;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <h1>reCAPTCHA reload interceptor</h1>
    <div class="row">
      <button id="block">Bloquer reload : OFF</button>
      <button id="refresh">Rafraîchir</button>
      <button id="dl">Télécharger JSON</button>
      <button id="clear">Vider</button>
    </div>
    <div class="small" id="count">0 capture</div>
    <div id="list"></div>
    <script src="popup.js"></script>
  </body>
</html>
